name: Build OpenAudible Image

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build-openaudible-image.yml"
      - "cmtzco-openaudible/**"
  pull_request:
    paths:
      - ".github/workflows/build-openaudible-image.yml"
      - "cmtzco-openaudible/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cmtzco-openaudible
  IMAGE_TAG: 4.8.3-d7bf8f9
  OPENAUDIBLE_DOCKER_REF: d7bf8f9b16e1d660594032cc4326a7bf894c396f

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: https://github.com/openaudible/openaudible_docker.git#${{ env.OPENAUDIBLE_DOCKER_REF }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
