version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: cmtzco-openaudible_server_1
      APP_PORT: 3000

  server:
    image: ghcr.io/cmtzco/cmtzco-openaudible:4.8.3-d7bf8f9
    restart: on-failure
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - OA_BETA=false
      - KASM_AUDIO_ENABLED=1
      - OA_KIOSK=true
      - oa_internal_browser=true
      - DWEBKIT_DISABLE_DMABUF_RENDERER=1
      - DWEBKIT_DISABLE_COMPOSITING_MODE=1
      - DWEBKIT_FORCE_SOFTWARE_RENDERING=1
      - DGDK_GL=disable
    security_opt:
      - seccomp:unconfined
    volumes:
      - ${APP_DATA_DIR}/data:/config/OpenAudible
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
