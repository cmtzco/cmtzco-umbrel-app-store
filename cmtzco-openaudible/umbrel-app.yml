manifestVersion: 1.1
id: cmtzco-openaudible
category: media
name: OpenAudible
version: "4.8.3-cmtzco.2"
tagline: Download, manage, and convert Audible libraries
description: >-
  OpenAudible is a desktop audiobook manager for downloading, backing up,
  organizing, and converting Audible libraries to MP3 and M4B formats.


  This app packages OpenAudible's Docker source for Umbrel, providing the
  desktop GUI through a browser-accessible remote desktop. OpenAudible is free
  to try; conversion to MP3/M4B requires a one-time OpenAudible license.


  This app uses a multi-arch GHCR image built from OpenAudible's Docker source
  for amd64 and arm64 Umbrel devices. The container stores OpenAudible settings
  and temporary files in Umbrel app data, with Umbrel Downloads available inside
  the app at /downloads for importing and exporting audiobooks.
developer: OpenAudible
website: https://openaudible.org
dependencies: []
repo: https://github.com/openaudible/openaudible_docker
support: https://github.com/openaudible/openaudible_docker/issues
port: 13430
gallery:
  - https://openaudible.org/screenshots/win/main_window.png
  - https://openaudible.org/images/1200x628.png
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  OpenAudible 4.8.3 adds a new View menu and improves compatibility,
  accessibility, and AI help. This Umbrel packaging uses a multi-arch GHCR image
  built from OpenAudible's Docker source to avoid amd64-only Docker Hub image
  startup failures on ARM devices. This update moves OpenAudible's writable
  config and temp directory to Umbrel app data while keeping Umbrel Downloads
  available at /downloads.
permissions:
  - STORAGE_DOWNLOADS
submitter: cmtzco
submission: https://github.com/cmtzco/cmtzco-umbrel-app-store
icon: https://openaudible.org/icons/512x512.png
torOnly: false
